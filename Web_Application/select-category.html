<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavorShelf | Select Product Type</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        @keyframes scaleUpFade {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .category-card {
            animation: scaleUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; /* Starts hidden */
        }
    </style>
</head>
<body style="background: #E9F0EC;">

    <div class="app-container">
        <!-- Premium Sidebar -->
        <aside class="sidebar">
            <a href="index" class="sidebar-logo">
                <div class="logo-icon"><i class="fas fa-leaf" style="display: block; color: white;"></i></div>
                <span>SavorShelf</span>
            </a>
            
            <nav class="nav-menu">
                <li class="nav-item">
                    <a href="dashboard" class="nav-link">
                        <i class="fas fa-th-large"></i> <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="products" class="nav-link">
                        <i class="fas fa-shopping-basket"></i> <span>My Products</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="scan" class="nav-link active">
                        <i class="fas fa-expand"></i> <span>Scan & Track</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="freshness" class="nav-link">
                        <i class="fas fa-chart-line"></i> <span>Analytics</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="settings" class="nav-link">
                        <i class="fas fa-cog"></i> <span>Settings</span>
                    </a>
                </li>
            </nav>

            <div class="sidebar-footer" style="margin-top: auto; padding: 20px; border-top: none;">
                <a href="javascript:void(0)" class="nav-link logout-btn" onclick="app.logout()" style="background: #FF5252 !important; color: white !important; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 800; padding: 14px; text-decoration: none; transition: 0.3s; box-shadow: 0 4px 10px rgba(255, 82, 82, 0.2);">
                    <i class="fas fa-sign-out-alt" style="color: white !important; margin: 0; width: auto; font-size: 18px;"></i> <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main View -->
        <main class="main-view" style="padding: 30px 40px; background: #F8FAFC; min-height: 100vh;">
            <div style="max-width: 950px; margin: 0 auto; width: 100%; padding-bottom: 60px;">
                
                <div class="category-card" style="text-align: center; margin-bottom: 30px; animation-delay: 0.05s;">
                    <h2 style="font-size: 28px; font-weight: 800; color: #1e293b; letter-spacing: -0.5px; margin: 0 0 6px 0;">What's in your bag?</h2>
                    <p style="font-size: 16px; color: #64748b; font-weight: 500; margin: 0;">Choose a product category to organize your shelf properly.</p>
                </div>

                <!-- Categories Grid -->
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
                    
                    <!-- Fruits -->
                    <div class="category-card" style="animation-delay: 0.1s; background: white; border-radius: 16px; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 2px solid transparent;" onclick="location.href='add-product-details?category=Fruits'" onmouseover="this.style.transform='translateY(-5px)'; this.style.borderColor='#0D614E'; this.style.boxShadow='0 15px 40px rgba(13, 97, 78, 0.1)'" onmouseout="this.style.transform='none'; this.style.borderColor='transparent'; this.style.boxShadow='0 10px 30px rgba(0,0,0,0.04)'">
                        <div style="border-radius: 12px; overflow: hidden; aspect-ratio: 1.2; margin-bottom: 8px;">
                            <img src="https://images.unsplash.com/photo-1610832958506-aa56368176cf?auto=format&fit=crop&w=400&q=80" alt="Fruits" style="width: 100%; height: 100%; object-fit: cover; transition: 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        </div>
                        <i class="fas fa-apple-alt" style="color: #0D614E; font-size: 14px; margin-bottom: 4px; display: block;"></i>
                        <h4 style="font-size: 14px; font-weight: 800; color: #1e293b; margin: 0;">Fruits</h4>
                    </div>

                    <!-- Vegetables -->
                    <div class="category-card" style="animation-delay: 0.2s; background: white; border-radius: 16px; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 2px solid transparent;" onclick="location.href='add-product-details?category=Vegetables'" onmouseover="this.style.transform='translateY(-5px)'; this.style.borderColor='#0D614E'; this.style.boxShadow='0 15px 40px rgba(13, 97, 78, 0.1)'" onmouseout="this.style.transform='none'; this.style.borderColor='transparent'; this.style.boxShadow='0 10px 30px rgba(0,0,0,0.04)'">
                        <div style="border-radius: 12px; overflow: hidden; aspect-ratio: 1.2; margin-bottom: 8px;">
                            <img src="https://images.unsplash.com/photo-1598170845058-32b9d6a5da37?auto=format&fit=crop&w=400&q=80" alt="Vegetables" style="width: 100%; height: 100%; object-fit: cover; transition: 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        </div>
                        <i class="fas fa-leaf" style="color: #0D614E; font-size: 14px; margin-bottom: 4px; display: block;"></i>
                        <h4 style="font-size: 14px; font-weight: 800; color: #1e293b; margin: 0;">Vegetables</h4>
                    </div>

                    <!-- Leafy Greens -->
                    <div class="category-card" style="animation-delay: 0.3s; background: white; border-radius: 16px; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 2px solid transparent;" onclick="location.href='add-product-details?category=Leafy Greens'" onmouseover="this.style.transform='translateY(-5px)'; this.style.borderColor='#0D614E'; this.style.boxShadow='0 15px 40px rgba(13, 97, 78, 0.1)'" onmouseout="this.style.transform='none'; this.style.borderColor='transparent'; this.style.boxShadow='0 10px 30px rgba(0,0,0,0.04)'">
                        <div style="border-radius: 12px; overflow: hidden; aspect-ratio: 1.2; margin-bottom: 8px;">
                            <img src="https://images.unsplash.com/photo-1576045057995-568f588f82fb?auto=format&fit=crop&w=400&q=80" alt="Leafy Greens" style="width: 100%; height: 100%; object-fit: cover; transition: 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        </div>
                        <i class="fab fa-envira" style="color: #0D614E; font-size: 14px; margin-bottom: 4px; display: block;"></i>
                        <h4 style="font-size: 14px; font-weight: 800; color: #1e293b; margin: 0;">Leafy Greens</h4>
                    </div>

                    <!-- Meat & Seafood -->
                    <div class="category-card" style="animation-delay: 0.4s; background: white; border-radius: 16px; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 2px solid transparent;" onclick="location.href='add-product-details?category=Meat %26 Seafood'" onmouseover="this.style.transform='translateY(-5px)'; this.style.borderColor='#0D614E'; this.style.boxShadow='0 15px 40px rgba(13, 97, 78, 0.1)'" onmouseout="this.style.transform='none'; this.style.borderColor='transparent'; this.style.boxShadow='0 10px 30px rgba(0,0,0,0.04)'">
                        <div style="border-radius: 12px; overflow: hidden; aspect-ratio: 1.2; margin-bottom: 8px;">
                            <img src="https://images.unsplash.com/photo-1607623814075-e51df1bdc82f?auto=format&fit=crop&w=400&q=80" alt="Meat & Seafood" style="width: 100%; height: 100%; object-fit: cover; transition: 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        </div>
                        <i class="fas fa-drumstick-bite" style="color: #0D614E; font-size: 14px; margin-bottom: 4px; display: block;"></i>
                        <h4 style="font-size: 14px; font-weight: 800; color: #1e293b; margin: 0;">Meat & Seafood</h4>
                    </div>

                    <!-- Dairy -->
                    <div class="category-card" style="animation-delay: 0.5s; background: white; border-radius: 16px; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 2px solid transparent;" onclick="location.href='add-product-details?category=Dairy'" onmouseover="this.style.transform='translateY(-5px)'; this.style.borderColor='#0D614E'; this.style.boxShadow='0 15px 40px rgba(13, 97, 78, 0.1)'" onmouseout="this.style.transform='none'; this.style.borderColor='transparent'; this.style.boxShadow='0 10px 30px rgba(0,0,0,0.04)'">
                        <div style="border-radius: 12px; overflow: hidden; aspect-ratio: 1.2; margin-bottom: 8px;">
                            <img src="https://images.unsplash.com/photo-1628088062854-d1870b4553da?auto=format&fit=crop&w=400&q=80" alt="Dairy" style="width: 100%; height: 100%; object-fit: cover; transition: 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        </div>
                        <i class="fas fa-cheese" style="color: #0D614E; font-size: 14px; margin-bottom: 4px; display: block;"></i>
                        <h4 style="font-size: 14px; font-weight: 800; color: #1e293b; margin: 0;">Dairy</h4>
                    </div>

                    <!-- Herbs & Seasonings -->
                    <div class="category-card" style="animation-delay: 0.6s; background: white; border-radius: 16px; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 2px solid transparent;" onclick="location.href='add-product-details?category=Herbs %26 Seasonings'" onmouseover="this.style.transform='translateY(-5px)'; this.style.borderColor='#0D614E'; this.style.boxShadow='0 15px 40px rgba(13, 97, 78, 0.1)'" onmouseout="this.style.transform='none'; this.style.borderColor='transparent'; this.style.boxShadow='0 10px 30px rgba(0,0,0,0.04)'">
                        <div style="border-radius: 12px; overflow: hidden; aspect-ratio: 1.2; margin-bottom: 8px;">
                            <img src="https://images.unsplash.com/photo-1596040033229-a9821ebd058d?auto=format&fit=crop&w=400&q=80" alt="Herbs & Seasonings" style="width: 100%; height: 100%; object-fit: cover; transition: 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        </div>
                        <i class="fas fa-seedling" style="color: #0D614E; font-size: 14px; margin-bottom: 4px; display: block;"></i>
                        <h4 style="font-size: 14px; font-weight: 800; color: #1e293b; margin: 0;">Herbs & Seasonings</h4>
                    </div>

                </div>

            </div>
        </main>
    </div>
    
    <!-- Mobile Navigation -->
    <nav class="mobile-bottom-nav">
        <a href="dashboard"><i class="fas fa-th-large"></i></a>
        <a href="products"><i class="fas fa-shopping-basket"></i></a>
        <a href="scan" class="active" style="background: var(--primary-gradient); width: 54px; height: 54px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; margin-top: -30px; box-shadow: 0 10px 20px rgba(13, 97, 78, 0.3);"><i class="fas fa-camera"></i></a>
        <a href="freshness"><i class="fas fa-chart-line"></i></a>
        <a href="settings"><i class="fas fa-cog"></i></a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
