<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SavorShelf</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #F4F7F6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-modal-card {
            max-width: 440px;
            width: 100%;
            background: white;
            border-radius: 28px;
            padding: 35px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .auth-modal-tabs {
            display: flex;
            background: #f1f5f9;
            border-radius: 14px;
            padding: 6px;
            margin-bottom: 25px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            color: #64748b;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
        }
        .auth-tab.active {
            background: white;
            color: #0D614E;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .close-modal-btn {
            position: absolute;
            top: 25px; right: 25px;
            background: transparent;
            border: none;
            font-size: 20px;
            color: #A1AFAB;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="auth-modal-card">
        <a href="index" class="close-modal-btn"><i class="fas fa-times"></i></a>
        
        <div class="auth-modal-tabs">
            <a href="login" class="auth-tab">Sign In</a>
            <a href="register" class="auth-tab active">Sign Up</a>
        </div>

        <form id="form-register" onsubmit="event.preventDefault(); handleRegister();">
            <div class="auth-modal-header">
                <h2 style="font-weight: 800; font-size: 28px; line-height: 1.2; color: #1B2625;">Create Account</h2>
                <p style="margin-bottom: 25px; font-size: 14px; color: #6F7E7A;">Join SavorShelf to manage your pantry.</p>
            </div>
            
            <div class="form-group web-auth-group">
                <label style="font-size:13px; font-weight:700; display:block; margin-bottom:6px; color:#6F7E7A;">Full Name</label>
                <div class="input-wrapper with-eye">
                    <i class="fas fa-user"></i>
                    <input type="text" id="reg-name" placeholder="John Doe" required>
                </div>
            </div>

            <div class="form-group web-auth-group">
                <label style="font-size:13px; font-weight:700; display:block; margin-bottom:6px; color:#6F7E7A;">Email Address</label>
                <div class="input-wrapper with-eye">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="reg-email" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="form-group web-auth-group">
                <label style="font-size:13px; font-weight:700; display:block; margin-bottom:6px; color:#6F7E7A;">Password</label>
                <div class="input-wrapper with-eye">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="reg-password" placeholder="********" required>
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('reg-password', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group web-auth-group" style="margin-bottom: 10px;">
                <label style="font-size:13px; font-weight:700; display:block; margin-bottom:6px; color:#6F7E7A;">Confirm Password</label>
                <div class="input-wrapper with-eye">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="reg-confirm" placeholder="********" required>
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('reg-confirm', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="auth-btn" id="reg-submit">Create Account</button>
        </form>
    </div>

    <script>
        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm').value;
            const btn = document.getElementById('reg-submit');
            
            if (password !== confirmPassword) {
                alert('Passwords do not match.'); return;
            }

            btn.disabled = true; 
            const originalText = btn.textContent;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Creating account...';

            try {
                const response = await fetch('http://127.0.0.1:5000/register', {
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        full_name: name, 
                        email: email, 
                        password: password, 
                        confirm_password: confirmPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    btn.innerHTML = '<i class="fas fa-check"></i> Success! Redirecting...';
                    btn.style.background = '#059669';
                    setTimeout(() => {
                        window.location.href = 'login?registered=' + encodeURIComponent(email);
                    }, 2000);
                } else {
                    alert(data.message || 'Registration failed.');
                    btn.disabled = false; 
                    btn.textContent = originalText;
                }
            } catch (err) {
                alert('Connection error. Is the backend running?');
                btn.disabled = false; 
                btn.textContent = originalText;
            }
        }
    </script>
</body>
</html>
