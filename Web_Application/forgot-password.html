<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SavorShelf</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #F4F7F6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-modal-card {
            max-width: 440px;
            width: 100%;
            background: white;
            border-radius: 28px;
            padding: 35px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .auth-step {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .auth-step.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .otp-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .modal-otp-input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            background: #fafafa;
            outline: none;
            transition: all 0.3s;
        }
        .modal-otp-input:focus {
            border-color: #0D614E;
            background: white;
            box-shadow: 0 0 0 4px rgba(13, 97, 78, 0.1);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: #0D614E;
        }
    </style>
</head>
<body>

    <div class="auth-modal-card">
        <!-- Step 1: Email Input -->
        <div id="step-forgot" class="auth-step active">
            <div class="auth-modal-header" style="text-align: center;">
                <i class="fas fa-lock" style="font-size: 32px; color: #0D614E; margin-bottom: 15px;"></i>
                <h2 style="font-weight: 800; font-size: 26px; line-height: 1.2; color: #1B2625;">Forgot Password?</h2>
                <p style="margin-bottom: 25px; font-size: 14px; color: #6F7E7A;">Enter your email to receive an OTP.</p>
            </div>
            
            <div class="form-group web-auth-group" style="margin-bottom: 15px;">
                <label style="font-size:13px; font-weight:700; display:block; margin-bottom:6px; color:#6F7E7A;">Email Address</label>
                <div class="input-wrapper with-eye">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="forgot-email" placeholder="you@example.com" required>
                </div>
            </div>

            <button type="button" class="auth-btn" id="btn-send-otp" onclick="handleSendOtp()">Send OTP</button>
            <a href="index" class="back-link"><i class="fas fa-arrow-left" style="margin-right:5px;"></i> Back to Login</a>
        </div>

        <!-- Step 2: Verify OTP -->
        <div id="step-verify" class="auth-step">
            <div class="auth-modal-header" style="text-align: center;">
                <i class="fas fa-check-circle" style="font-size: 32px; color: #0D614E; margin-bottom: 20px;"></i>
                <h2 style="font-weight: 800; font-size: 26px; line-height: 1.2; color: #1B2625;">Verify OTP</h2>
                <p id="verify-subtitle" style="margin-bottom: 25px; font-size: 14px; color: #6F7E7A;">Enter the code sent to your email.</p>
            </div>

            <div class="otp-container">
                <input type="text" maxlength="1" class="modal-otp-input" onkeyup="moveFocus(this, 1)">
                <input type="text" maxlength="1" class="modal-otp-input" onkeyup="moveFocus(this, 2)">
                <input type="text" maxlength="1" class="modal-otp-input" onkeyup="moveFocus(this, 3)">
                <input type="text" maxlength="1" class="modal-otp-input" onkeyup="moveFocus(this, 4)">
            </div>

            <button type="button" class="auth-btn" id="btn-verify-otp" onclick="handleVerifyOtp()">Verify Code</button>
            <a href="javascript:void(0)" onclick="goStep('forgot')" class="back-link"><i class="fas fa-arrow-left" style="margin-right:5px;"></i> Back</a>
        </div>

        <!-- Step 3: New Password -->
        <div id="step-reset" class="auth-step">
            <div class="auth-modal-header" style="text-align: center;">
                <i class="fas fa-shield-alt" style="font-size: 32px; color: #0D614E; margin-bottom: 20px;"></i>
                <h2 style="font-weight: 800; font-size: 26px; line-height: 1.2; color: #1B2625;">New Password</h2>
                <p style="margin-bottom: 25px; font-size: 14px; color: #6F7E7A;">Create your new secure password.</p>
            </div>

            <div class="form-group web-auth-group" style="margin-bottom: 15px;">
                <label style="font-size:13px; font-weight:700; display:block; margin-bottom:6px; color:#6F7E7A;">New Password</label>
                <div class="input-wrapper with-eye">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="new-password" placeholder="********" required>
                    <button type="button" class="password-toggle" onclick="toggleVisibility('new-password', this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>

            <div class="form-group web-auth-group" style="margin-bottom: 15px;">
                <label style="font-size:13px; font-weight:700; display:block; margin-bottom:6px; color:#6F7E7A;">Confirm Password</label>
                <div class="input-wrapper with-eye">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirm-password" placeholder="********" required>
                    <button type="button" class="password-toggle" onclick="toggleVisibility('confirm-password', this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>

            <button type="button" class="auth-btn" id="btn-reset-password" onclick="handleResetPassword()">Reset Password</button>
        </div>

        <!-- Step 4: Success -->
        <div id="step-success" class="auth-step" style="text-align: center;">
            <div style="background: #E8F5E9; margin: 0 auto 20px; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #439A6B;">
                <i class="fas fa-check" style="font-size: 40px;"></i>
            </div>
            <h2 style="font-weight: 800; font-size: 26px; line-height: 1.2; color: #1B2625;">All Set!</h2>
            <p style="margin-bottom: 25px; font-size: 14px; color: #6F7E7A;">Your password has been reset successfully.</p>
            <a href="index" class="auth-btn" style="text-decoration: none; display: block;">Sign In Now</a>
        </div>
    </div>

    <script>
        let userEmail = "";

        function goStep(step) {
            document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
            document.getElementById('step-' + step).classList.add('active');
            if(step === 'verify') {
                document.getElementById('verify-subtitle').innerHTML = `Enter the code sent to <span style="color:#0D614E; font-weight:800;">${userEmail}</span>`;
            }
        }

        function moveFocus(current, index) {
            if (current.value.length === 1 && index < 4) {
                document.querySelectorAll('.modal-otp-input')[index].focus();
            } else if (current.value.length === 0 && index > 1) {
                document.querySelectorAll('.modal-otp-input')[index - 2].focus();
            }
        }

        function toggleVisibility(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function handleSendOtp() {
            const email = document.getElementById('forgot-email').value;
            if(!email) return alert('Email required');
            const btn = document.getElementById('btn-send-otp');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            try {
                const res = await fetch('http://127.0.0.1:5000/forgot-password', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if(res.ok) {
                    userEmail = email;
                    goStep('verify');
                } else {
                    alert(data.message || 'Error');
                }
            } catch(e) { alert('Server error'); }
            btn.disabled = false; btn.textContent = 'Send OTP';
        }

        async function handleVerifyOtp() {
            const inputs = document.querySelectorAll('.modal-otp-input');
            let otp = Array.from(inputs).map(i => i.value).join('');
            if(otp.length < 4) return alert('Enter 4-digit OTP');
            const btn = document.getElementById('btn-verify-otp');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
            try {
                const res = await fetch('http://127.0.0.1:5000/verify-otp', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: userEmail, otp: otp })
                });
                const data = await res.json();
                if(res.ok) {
                    goStep('reset');
                } else {
                    alert(data.message || 'Error');
                }
            } catch(e) { alert('Server error'); }
            btn.disabled = false; btn.textContent = 'Verify Code';
        }

        async function handleResetPassword() {
            const pwd = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            if(!pwd || !confirm) return alert('Fill both fields');
            if(pwd !== confirm) return alert('Passwords do not match');
            const btn = document.getElementById('btn-reset-password');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
            try {
                const res = await fetch('http://127.0.0.1:5000/reset-password', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: userEmail, new_password: pwd, confirm_password: confirm })
                });
                const data = await res.json();
                if(res.ok) {
                    goStep('success');
                } else {
                    alert(data.message || 'Error');
                }
            } catch(e) { alert('Server error'); }
            btn.disabled = false; btn.textContent = 'Reset Password';
        }
    </script>
</body>
</html>
